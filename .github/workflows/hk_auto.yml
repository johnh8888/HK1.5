name: 香港彩自动进化

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时自动运行一次

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install optuna numpy

      - name: 缓存数据库
        uses: actions/cache@v4
        with:
          path: |
            hk_marksix.db
            optuna_hk.db
          key: hk-marksix-cache-${{ hashFiles('hk_marksix.db') }}
          restore-keys: hk-marksix-cache-

      - name: 同步最新开奖数据
        run: python hk_marksix.py sync

      - name: 多轮连续优化
        shell: bash
        run: |
          for i in {1..200}; do
            echo "====== 第 $i 轮优化 ======"
            python hyper_optimize_hk.py --trials 200
            STATUS=$?
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add best_params_hk.json optuna_hk.db 2>/dev/null
            git commit -m "香港彩优化第${i}轮 [skip ci]" 2>/dev/null
            git push 2>/dev/null
            if [ $STATUS -eq 0 ]; then
              echo "🎉 已达目标，停止优化！"
              break
            fi
            sleep 3
          done

      - name: 重建回测与报告
        if: always()
        run: |
          python hk_marksix.py backfill-special || true
          python hk_marksix.py backtest --rebuild || true
          python hk_marksix.py show | tee report_hk.txt

      - name: 提交结果
        if: always()
        run: |
          git add best_params_hk.json optuna_hk.db report_hk.txt hk_marksix.db 2>/dev/null
          git commit -m "香港彩自动进化结果 [skip ci]" 2>/dev/null
          git push 2>/dev/null
