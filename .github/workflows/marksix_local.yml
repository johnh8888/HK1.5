name: 香港1.5自动更新与推送

on:
  schedule:
    - cron: '0 14 * * 2,4,6'   # 周二、四、六 UTC 14:00
  workflow_dispatch:

jobs:
  update-predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install lightgbm scikit-learn numpy hmmlearn tensorflow

      - name: 配置 PushPlus Token
        run: echo "PUSHPLUS_TOKEN=${{ secrets.PUSHPLUS_TOKEN }}" >> $GITHUB_ENV

      - name: 初始化数据库（如果不存在）
        run: |
          if [ ! -f "hk_marksix.db" ]; then
            python hk_marksix.py bootstrap
          fi

      - name: 同步最新开奖并生成预测
        run: |
          python hk_marksix.py sync

      - name: 显示结果并推送微信
        run: |
          python hk_marksix.py show

      - name: 上传数据库（可选）
        uses: actions/upload-artifact@v4
        with:
          name: hk-marksix-db
          path: hk_marksix.db
          retention-days: 7